<!DOCTYPE html>
<html lang="">
  <head>
    <script>window.global = window;</script>
    <script>
      // GitHub Pages SPA: restore path from ?p= query param set by 404.html
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var decoded = decodeURIComponent(p).replace(/^\//, '');
          var base = window.location.pathname.replace(/\/$/, '');
          var url = base + '/' + decoded + window.location.hash;
          window.history.replaceState(null, '', url);
        }
      })();
    </script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/sm-dashboard-client/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/sm-dashboard-client/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <title>SIMEMAP — IoT Monitoring Dashboard</title>
    <script>
      window.MathJax = {
        tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
        svg: { fontCache: 'global' },
        startup: { typeset: false }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
