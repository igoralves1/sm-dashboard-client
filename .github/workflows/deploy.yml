name: Deploy to GitHub Pages

on:
  push:
    branches:
      - alle
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_AWS_REGION:        ${{ secrets.VITE_AWS_REGION }}
          VITE_IDENTITY_POOL_ID:  ${{ secrets.VITE_IDENTITY_POOL_ID }}
          VITE_USER_POOL_ID:      ${{ secrets.VITE_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_TIMESTREAM_DB:     ${{ secrets.VITE_TIMESTREAM_DB }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
