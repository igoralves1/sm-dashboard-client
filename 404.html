<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect: encode the path into the query string
      // so index.html can restore it on load.
      var repo = '/sm-dashboard-client';
      var path = window.location.pathname.replace(repo, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = window.location.origin + repo +
        '/?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
